$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun -theme ~/.config/rofi/theme.rasi

source = ~/.config/hypr/theme.conf


# --- MONITORS ---
# Using 'auto' is fine, but ensure your primary is identified
monitor=,preferred,auto,1

# --- EXECUTE AT LAUNCH ---
exec-once = swww-daemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Start a notification daemon (Working envs need to see system pings)
exec-once = dunst 
exec-once = waybar

# --- INPUT ---
input {
    kb_layout = tr
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# --- WORKING LOOK ---
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    
    # This now correctly uses the variables from your theme.conf
    col.active_border = $accent
    col.inactive_border = $bg
    
    layout = dwindle
}

# --- SMART UI ---
decoration {
    rounding = 8
    # Lower blur for performance during heavy work
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}



# --- WORKFLOW ANIMATIONS ---
animations {
    enabled = yes
    bezier = workBezier, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 3, workBezier, popin 80%
    animation = workspaces, 1, 4, default, slide
}

# --- KEYBINDS ---
$mainMod = SUPER

# Quick Launch
bind = $mainMod, T, exec, $terminal
bind = ALT, F4, killactive, 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, togglefloating, 
bind = $mainMod, M, exit, 
# Super + Alt + B to refresh the bar

# Super + W to change everything without a terminal
bind = $mainMod, W, exec, ~/walltheme.sh

bind = $mainMod SHIFT, B, exec, killall waybar; waybar &

# FOCUS (Vim-style or Arrows)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# WORKSPACES (Quick Switch)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
# MOVE WINDOW TO WORKSPACE
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
# --- THE WORKING ESSENTIALS ---

# Volume & Brightness (Requires: wireplumber/brightnessctl)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot region to clipboard
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Region copied to clipboard"

# --- WINDOW RESIZING ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Master/Stack Toggle (Good for coding)
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Change DP-1 to eDP-1
workspace = 1, name:1, monitor:eDP-1, default:true
workspace = 2, name:2, monitor:eDP-1
workspace = 3, name:3, monitor:eDP-1
workspace = 4, name:4, monitor:eDP-1